plugins {
    id 'com.android.application'
}

android {
    namespace 'com.enship.travel'
    compileSdk 34

    defaultConfig {
        applicationId "com.enship.travel"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
    }

    buildTypes {
        debug {
            applicationIdSuffix ".debug"
            debuggable true
        }
        release {
            minifyEnabled false
            debuggable false
            // Signature de debug pour test CI — remplacer par un vrai keystore en prod
            signingConfig signingConfigs.debug
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.core:core:1.12.0'
}
